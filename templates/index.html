<!DOCTYPE html>
<html>
<head>
    <title>Sentiment Analyzer</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;

            /* BACKGROUND IMAGE */
            background: url("{{ url_for('static', filename='bg.jpg') }}") no-repeat center center fixed;
            background-size: cover;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: rgba(20, 30, 50, 0.85);
            padding: 35px;
            width: 420px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0px 10px 40px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            color: white;
        }

        h2 {
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 14px;
        }

        textarea::placeholder {
            color: #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 25px;
            border: none;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #00f2fe;
        }

        .result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
        }

        .positive {
            color: #00ff9f;
            font-weight: bold;
        }

        .negative {
            color: #ff4c4c;
            font-weight: bold;
        }

        .neutral {
            color: orange;
            font-weight: bold;
        }

        .bar {
            width: 100%;
            height: 10px;
            background: #333;
            border-radius: 10px;
            margin-top: 10px;
        }

        .fill {
            height: 10px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>💬 Sentiment Analyzer</h2>

    <form action="/analyze" method="post">
        <textarea name="text" rows="4" placeholder="Type something..."></textarea>
        <button type="submit">Analyze</button>
    </form>

    {% if label %}
    <div class="result-box">
        <p><strong>Text:</strong> {{ text }}</p>

        <p>
            <strong>Sentiment:</strong>
            <span class="
                {% if label == 'POSITIVE' %}positive
                {% elif label == 'NEGATIVE' %}negative
                {% else %}neutral
                {% endif %}
            ">
                {{ label }}
                {% if label == 'POSITIVE' %} 😊
                {% elif label == 'NEGATIVE' %} 😡
                {% else %} 😐
                {% endif %}
            </span>
        </p>

        <p><strong>Confidence:</strong> {{ score }}</p>

        <div class="bar">
            <div class="fill" style="
                width: {{ score * 100 }}%;
                background:
                {% if label == 'POSITIVE' %}#00ff9f
                {% elif label == 'NEGATIVE' %}#ff4c4c
                {% else %}orange
                {% endif %};
            "></div>
        </div>
    </div>
    {% endif %}
</div>

</body>
</html>
